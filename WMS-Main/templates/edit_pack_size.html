{% extends "base.html" %}

{% block title %}Edit Pack Size{% endblock %}
{% block content %}

    <div class="container mt-5">
        <h1>Edit Pack Size</h1>
        <form action="{{ url_for('edit_pack_size', pack_id=pack_size.id) }}" method="POST">
            <div class="mb-3">
                <label for="size" class="form-label">Pack Size:</label>
                <input type="text" id="size" name="size" class="form-control" value="{{ pack_size.size }}" required>
            </div>
            <div class="mb-3">
                <label for="max_capacity" class="form-label">Max Capacity:</label>
                <input type="number" id="max_capacity" name="max_capacity" class="form-control" value="{{ pack_size.max_capacity }}" required>
            </div>
            <button type="submit" class="btn btn-success">Update Pack Size</button>
            <a href="{{ url_for('add_sku_html') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
{% endblock %}
