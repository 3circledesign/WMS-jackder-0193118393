{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}
{% block content %}


<!-- Main Container -->
<div class="container mt-5 text-center">
    <img src="{{ url_for('static', filename='logo_.png') }}" alt="Logo" width="200" height="200" class="me-2">
    <h1>Warehouse Inventory Management</h1>
    <p>Welcome to the Warehouse Inventory Management System. What would you like to do?</p>

    <div class="mt-4">
        <!-- Link to Create Stock Page -->
        <a href="/create-stock" class="btn btn-primary btn-lg m-2">Goods Receiving</a>

        <!-- Link to Stock List Page -->
        <a href="/stocks" class="btn btn-secondary btn-lg m-2">View Inventory</a>

        <!-- Existing buttons for Add SKU and SKU List -->
        <a href="/add-sku" class="btn btn-primary btn-lg m-2">Add SKU</a>
        <a href="/sku-list" class="btn btn-secondary btn-lg m-2">View SKU List</a>
        <a href="/create-order" class="btn btn-secondary btn-lg m-2">Create Picklist</a>
        <a href="/orders" class="btn btn-success btn-lg m-2">View Picklist</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
